<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Chat_With_Us 💬</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rsbg47X7/8f55b377-3e6f-4bc9-bbc5-9b1ed3057599.png">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: linear-gradient(145deg, #0b1f3a, #1e4b6e);
      direction: rtl;
    }
    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px;
    }
    .card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(20, 40, 60, 0.4);
      backdrop-filter: blur(18px);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.15);
      overflow: hidden;
    }
    .header {
      padding: 18px 20px;
      text-align: center;
      color: white;
      font-weight: 700;
      font-size: 1.4rem;
      background: rgba(0, 30, 60, 0.5);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    /* صفحة المصادقة */
    #auth {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    
    .auth-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .auth-form {
      max-width: 400px;
      margin: 0 auto;
    }
    
    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.1);
      padding: 5px;
      border-radius: 50px;
    }
    
    .auth-tab {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 50px;
      background: transparent;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    
    .auth-tab.active {
      background: #3498db;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .auth-input {
      width: 100%;
      padding: 15px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1rem;
    }
    
    .auth-input:focus {
      outline: none;
      border-color: #3498db;
    }
    
    .action-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    
    .action-btn.primary {
      background: #3498db;
      color: white;
    }
    
    .action-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 2px solid rgba(255,255,255,0.2);
    }
    
    .google-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #db4437;
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .separator {
      text-align: center;
      color: white;
      margin: 20px 0;
      position: relative;
    }
    
    .separator::before,
    .separator::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: rgba(255,255,255,0.3);
    }
    
    .separator::before { left: 0; }
    .separator::after { right: 0; }
    
    /* صفحة المحادثة */
    #chat {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    
    .chat-header {
      padding: 15px 20px;
      background: rgba(0, 30, 60, 0.8);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }
    
    .chat-title {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .chat-title h2 {
      margin: 0;
      font-size: 1.3rem;
    }
    
    .online-count {
      background: rgba(46, 204, 113, 0.2);
      border: 1px solid #2ecc71;
      color: #2ecc71;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .online-count-dot {
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .chat-actions {
      display: flex;
      gap: 10px;
    }
    
    .chat-action-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1.2rem;
    }
    
    .chat-action-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }
    
    .chat-action-btn.logout {
      background: rgba(231, 76, 60, 0.2);
      border-color: #e74c3c;
    }
    
    /* تخطيط المحادثة */
    .chat-layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    
    /* الشريط الجانبي */
    .sidebar {
      width: 260px;
      background: rgba(0, 0, 0, 0.3);
      border-left: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: white;
      font-weight: 600;
    }
    
    .online-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    
    .online-user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 5px;
    }
    
    .online-user-item:hover {
      background: rgba(52, 152, 219, 0.2);
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #3498db;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      position: relative;
    }
    
    .user-status {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
    }
    
    .user-status.online {
      background: #2ecc71;
    }
    
    .user-info {
      flex: 1;
    }
    
    .user-name {
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
    }
    
    /* منطقة المحادثة الرئيسية */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .chat-mode {
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .mode-tabs {
      display: flex;
      gap: 5px;
    }
    
    .mode-tab {
      padding: 8px 20px;
      border: none;
      border-radius: 20px;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    
    .mode-tab.active {
      background: #3498db;
    }
    
    .mode-tab.private {
      background: #9b59b6;
      display: none;
    }
    
    .mode-tab.private.show {
      display: block;
    }
    
    .close-private-btn {
      background: transparent;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 1.2rem;
      display: none;
    }
    
    /* منطقة الرسائل */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: slideIn 0.3s;
    }
    
    .message-wrapper.own {
      align-self: flex-end;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    
    .message-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #3498db;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.8rem;
      font-weight: bold;
    }
    
    .message-sender {
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
    }
    
    .message-time {
      color: rgba(255,255,255,0.4);
      font-size: 0.7rem;
    }
    
    .message-bubble {
      padding: 12px 16px;
      border-radius: 18px 18px 18px 5px;
      background: rgba(52, 152, 219, 0.2);
      border: 1px solid rgba(52, 152, 219, 0.3);
      color: white;
    }
    
    .message-wrapper.own .message-bubble {
      background: rgba(52, 152, 219, 0.7);
      border-radius: 18px 18px 5px 18px;
    }
    
    .message-wrapper.private .message-bubble {
      background: rgba(155, 89, 182, 0.2);
      border-color: #9b59b6;
    }
    
    .message-wrapper.private.own .message-bubble {
      background: rgba(155, 89, 182, 0.6);
    }
    
    /* منطقة الإدخال */
    .input-area {
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .chat-input {
      flex: 1;
      padding: 12px 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1rem;
    }
    
    .chat-input:focus {
      outline: none;
      border-color: #3498db;
    }
    
    .send-btn {
      background: #3498db;
      border: none;
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.3s;
    }
    
    .send-btn:hover {
      background: #2980b9;
      transform: scale(1.1);
    }
    
    /* مؤشر التحميل */
    .loader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #0b1f3a, #1e4b6e);
      z-index: 10000;
      transition: 0.3s;
    }
    
    .loader-container.hidden {
      opacity: 0;
      visibility: hidden;
    }
    
    .loader {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loader-text {
      color: white;
      margin-top: 15px;
      font-size: 1.1rem;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* النوافذ المنبثقة */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 5000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    
    .modal-overlay.show {
      display: flex;
    }
    
    .modal-content {
      background: linear-gradient(145deg, #1e3a5f, #2c3e50);
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      border: 2px solid #f1c40f;
    }
    
    .modal-content h3 {
      color: #f1c40f;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .modal-content input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #f1c40f;
      background: rgba(255,255,255,0.1);
      color: white;
      margin-bottom: 20px;
    }
    
    .modal-buttons {
      display: flex;
      gap: 10px;
    }
    
    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    
    .send-btn {
      background: #f1c40f;
      color: #2c3e50;
    }
    
    .cancel-btn {
      background: #e74c3c;
      color: white;
    }
  </style>
</head>
<body>
<div class="loader-container" id="loader">
  <div style="text-align: center;">
    <div class="loader"></div>
    <div class="loader-text">جاري التحميل...</div>
  </div>
</div>

<div class="container">
  <!-- صفحة المصادقة -->
  <div class="card" id="auth">
    <div class="header">💬 مرحباً بك في الدردشة</div>
    <div class="auth-content">
      <div class="auth-form">
        <div class="auth-tabs">
          <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">تسجيل الدخول</button>
          <button class="auth-tab" id="registerTab" onclick="switchAuthTab('register')">إنشاء حساب</button>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <div id="loginForm">
          <div class="input-group">
            <input type="email" id="loginEmail" class="auth-input" placeholder="البريد الإلكتروني">
          </div>
          <div class="input-group">
            <input type="password" id="loginPassword" class="auth-input" placeholder="كلمة المرور">
          </div>
          <button class="action-btn primary" onclick="login()">تسجيل الدخول</button>
          <div style="text-align: center; margin: 15px 0;">
            <button onclick="showForgotPasswordModal()" style="background: none; border: none; color: #f1c40f; cursor: pointer;">نسيت كلمة السر؟</button>
          </div>
        </div>

        <!-- نموذج إنشاء حساب -->
        <div id="registerForm" style="display: none;">
          <div class="input-group">
            <input type="text" id="username" class="auth-input" placeholder="اسم المستخدم">
          </div>
          <div class="input-group">
            <input type="email" id="email" class="auth-input" placeholder="البريد الإلكتروني">
          </div>
          <div class="input-group">
            <input type="password" id="password" class="auth-input" placeholder="كلمة المرور">
          </div>
          <button class="action-btn secondary" onclick="register()">إنشاء حساب</button>
        </div>

        <div class="separator">أو</div>

        <button class="google-btn" onclick="googleLogin()">
          <svg style="width:20px; height:20px;" viewBox="0 0 24 24">
            <path fill="white" d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
          </svg>
          Google تسجيل الدخول بحساب
        </button>
      </div>
    </div>
  </div>

  <!-- صفحة المحادثة -->
  <div class="card" id="chat">
    <div class="chat-header">
      <div class="chat-title">
        <h2>💬 المحادثة العامة</h2>
        <div class="online-count">
          <span class="online-count-dot"></span>
          <span id="onlineCount">0 متصل</span>
        </div>
      </div>
      <div class="chat-actions">
        <button class="chat-action-btn logout" onclick="logout()">🚪</button>
      </div>
    </div>

    <div class="chat-layout">
      <!-- الشريط الجانبي -->
      <div class="sidebar">
        <div class="sidebar-header">
          <span>👥 المتصلون</span>
        </div>
        <div class="online-list" id="onlineList"></div>
      </div>

      <!-- منطقة المحادثة -->
      <div class="chat-main">
        <div class="chat-mode">
          <div class="mode-tabs">
            <button class="mode-tab active" id="publicModeTab" onclick="switchMode('public')">🌐 عام</button>
            <button class="mode-tab private" id="privateModeTab" onclick="switchMode('private')">🔒 خاص</button>
          </div>
          <button class="close-private-btn" id="closePrivateBtn" onclick="closePrivateChat()">✕</button>
        </div>

        <div class="messages-container" id="messages"></div>

        <div class="input-area">
          <input type="text" id="messageInput" class="chat-input" placeholder="اكتب رسالتك هنا...">
          <button class="send-btn" onclick="sendMessage()">✈️</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- نافذة نسيت كلمة السر -->
<div class="modal-overlay" id="forgotPasswordModal">
  <div class="modal-content">
    <h3>🔑 استعادة كلمة السر</h3>
    <input type="email" id="resetEmail" placeholder="البريد الإلكتروني">
    <div class="modal-buttons">
      <button class="send-btn" onclick="sendPasswordReset()">إرسال</button>
      <button class="cancel-btn" onclick="hideForgotPasswordModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
  // ✅ تهيئة Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyANJjbTOFTKUAuT-g1BKY7LU9a4OabSEDQ",
    authDomain: "enhanced-app-492f6.firebaseapp.com",
    projectId: "enhanced-app-492f6",
    storageBucket: "enhanced-app-492f6.firebasestorage.app",
    messagingSenderId: "544947944105",
    appId: "1:544947944105:web:f2ac32d485c8ad68b647b8"
  };
  
  // تهيئة Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const googleProvider = new firebase.auth.GoogleAuthProvider();

  // ✅ العناصر
  const loader = document.getElementById('loader');
  const authDiv = document.getElementById('auth');
  const chatDiv = document.getElementById('chat');
  const messagesDiv = document.getElementById('messages');
  const messageInput = document.getElementById('messageInput');
  const onlineList = document.getElementById('onlineList');
  const onlineCount = document.getElementById('onlineCount');
  
  // ✅ متغيرات الحالة
  let currentUser = null;
  let currentUsername = '';
  let unsubscribePublic = null;
  let unsubscribeOnline = null;
  let activePartner = null;
  let isPrivateMode = false;

  // ===== دوال المصادقة =====
  window.switchAuthTab = function(tab) {
    document.getElementById('loginTab').classList.toggle('active', tab === 'login');
    document.getElementById('registerTab').classList.toggle('active', tab === 'register');
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  };

  window.login = function() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      alert('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
      return;
    }
    
    auth.signInWithEmailAndPassword(email, password)
      .catch(error => alert('خطأ في تسجيل الدخول: ' + error.message));
  };

  window.register = function() {
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    if (!username || !email || !password) {
      alert('الرجاء ملء جميع الحقول');
      return;
    }
    
    if (password.length < 6) {
      alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
      return;
    }
    
    auth.createUserWithEmailAndPassword(email, password)
      .then(result => {
        return db.collection('users').doc(result.user.uid).set({
          username: username,
          email: email,
          online: true
        });
      })
      .catch(error => alert('خطأ في التسجيل: ' + error.message));
  };

  window.googleLogin = function() {
    auth.signInWithPopup(googleProvider)
      .then(result => {
        const email = result.user.email;
        const username = email.split('@')[0];
        return db.collection('users').doc(result.user.uid).set({
          username: username,
          email: email,
          online: true
        }, { merge: true });
      })
      .catch(error => alert('خطأ في تسجيل الدخول: ' + error.message));
  };

  window.logout = function() {
    if (currentUser) {
      db.collection('users').doc(currentUser.uid).update({ online: false })
        .finally(() => auth.signOut());
    }
  };

  // ===== دوال المحادثة =====
  window.sendMessage = function() {
    const text = messageInput.value.trim();
    if (!text || !currentUser) return;
    
    if (isPrivateMode && activePartner) {
      // رسالة خاصة
      const roomId = currentUser.uid < activePartner.uid 
        ? currentUser.uid + '_' + activePartner.uid 
        : activePartner.uid + '_' + currentUser.uid;
      
      db.collection('private_messages').add({
        text: text,
        username: currentUsername,
        uid: currentUser.uid,
        toUid: activePartner.uid,
        roomId: roomId,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      // رسالة عامة
      db.collection('messages').add({
        text: text,
        username: currentUsername,
        uid: currentUser.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    
    messageInput.value = '';
  };

  window.switchMode = function(mode) {
    isPrivateMode = mode === 'private';
    
    document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
    if (mode === 'public') {
      document.getElementById('publicModeTab').classList.add('active');
      loadPublicMessages();
    } else {
      document.getElementById('privateModeTab').classList.add('active');
    }
  };

  window.openPrivateChat = function(uid, username) {
    if (!currentUser) return;
    
    activePartner = { uid, username };
    document.getElementById('privateModeTab').classList.add('show');
    document.getElementById('closePrivateBtn').style.display = 'block';
    document.getElementById('privateModeTab').innerHTML = `🔒 ${username}`;
    
    switchMode('private');
    loadPrivateMessages(uid);
  };

  window.closePrivateChat = function() {
    activePartner = null;
    document.getElementById('privateModeTab').classList.remove('show');
    document.getElementById('closePrivateBtn').style.display = 'none';
    document.getElementById('privateModeTab').innerHTML = '🔒 خاص';
    document.getElementById('publicModeTab').click();
  };

  // ===== تحميل الرسائل =====
  function loadPublicMessages() {
    if (unsubscribePublic) unsubscribePublic();
    
    unsubscribePublic = db.collection('messages')
      .orderBy('createdAt', 'asc')
      .onSnapshot(snapshot => {
        messagesDiv.innerHTML = '';
        
        snapshot.forEach(doc => {
          const msg = doc.data();
          if (!msg.text) return;
          
          const wrapper = document.createElement('div');
          wrapper.className = `message-wrapper ${msg.uid === currentUser?.uid ? 'own' : ''}`;
          
          let time = '';
          if (msg.createdAt?.toDate) {
            const d = msg.createdAt.toDate();
            time = `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
          }
          
          wrapper.innerHTML = `
            <div class="message-header">
              <div class="message-avatar">${msg.username ? msg.username.charAt(0).toUpperCase() : '?'}</div>
              <span class="message-sender">${escapeHtml(msg.username)}</span>
              <span class="message-time">${time}</span>
            </div>
            <div class="message-bubble">
              <div class="message-text">${escapeHtml(msg.text)}</div>
            </div>
          `;
          
          messagesDiv.appendChild(wrapper);
        });
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
  }

  function loadPrivateMessages(partnerUid) {
    if (unsubscribePublic) unsubscribePublic();
    
    const roomId = currentUser.uid < partnerUid 
      ? currentUser.uid + '_' + partnerUid 
      : partnerUid + '_' + currentUser.uid;
    
    unsubscribePublic = db.collection('private_messages')
      .where('roomId', '==', roomId)
      .orderBy('createdAt', 'asc')
      .onSnapshot(snapshot => {
        messagesDiv.innerHTML = '';
        
        snapshot.forEach(doc => {
          const msg = doc.data();
          if (!msg.text) return;
          
          const wrapper = document.createElement('div');
          wrapper.className = `message-wrapper ${msg.uid === currentUser?.uid ? 'own' : ''} private`;
          
          let time = '';
          if (msg.createdAt?.toDate) {
            const d = msg.createdAt.toDate();
            time = `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
          }
          
          wrapper.innerHTML = `
            <div class="message-header">
              <div class="message-avatar">${msg.username ? msg.username.charAt(0).toUpperCase() : '?'}</div>
              <span class="message-sender">${escapeHtml(msg.username)}</span>
              <span class="message-time">${time}</span>
            </div>
            <div class="message-bubble">
              <div class="message-text">${escapeHtml(msg.text)}</div>
            </div>
          `;
          
          messagesDiv.appendChild(wrapper);
        });
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
  }

  // ===== تحميل قائمة المتصلين =====
  function loadOnlineUsers() {
    if (unsubscribeOnline) unsubscribeOnline();
    
    unsubscribeOnline = db.collection('users')
      .where('online', '==', true)
      .onSnapshot(snapshot => {
        let html = '';
        let count = 0;
        
        snapshot.forEach(doc => {
          const data = doc.data();
          if (doc.id !== currentUser?.uid) {
            count++;
            html += `
              <div class="online-user-item" onclick="openPrivateChat('${doc.id}', '${escapeHtml(data.username)}')">
                <div class="user-avatar">
                  ${data.username ? data.username.charAt(0).toUpperCase() : '?'}
                  <span class="user-status online"></span>
                </div>
                <div class="user-info">
                  <div class="user-name">${escapeHtml(data.username)}</div>
                </div>
              </div>
            `;
          }
        });
        
        onlineList.innerHTML = html || '<div style="color:white; text-align:center; padding:20px;">لا يوجد متصلين</div>';
        onlineCount.textContent = `${count} متصل`;
      });
  }

  // ===== دوال مساعدة =====
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // ===== دوال نافذة نسيت كلمة السر =====
  window.showForgotPasswordModal = function() {
    document.getElementById('forgotPasswordModal').classList.add('show');
  };

  window.hideForgotPasswordModal = function() {
    document.getElementById('forgotPasswordModal').classList.remove('show');
  };

  window.sendPasswordReset = function() {
    const email = document.getElementById('resetEmail').value;
    if (!email) {
      alert('الرجاء إدخال البريد الإلكتروني');
      return;
    }
    
    auth.sendPasswordResetEmail(email)
      .then(() => {
        alert('تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني');
        hideForgotPasswordModal();
      })
      .catch(error => alert('خطأ: ' + error.message));
  };

  // ===== مراقبة حالة المصادقة =====
  auth.onAuthStateChanged(async (user) => {
    console.log('حالة المصادقة:', user ? 'مستخدم موجود' : 'لا يوجد مستخدم');
    
    try {
      if (user) {
        currentUser = user;
        
        // الحصول على بيانات المستخدم
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (userDoc.exists) {
          currentUsername = userDoc.data().username;
        } else {
          currentUsername = user.email.split('@')[0];
          await db.collection('users').doc(user.uid).set({
            username: currentUsername,
            email: user.email,
            online: true
          });
        }
        
        // تحديث حالة المستخدم
        await db.collection('users').doc(user.uid).update({ online: true });
        
        // تحميل البيانات
        loadPublicMessages();
        loadOnlineUsers();
        
        // إظهار المحادثة
        authDiv.style.display = 'none';
        chatDiv.style.display = 'flex';
      } else {
        // إظهار صفحة تسجيل الدخول
        authDiv.style.display = 'flex';
        chatDiv.style.display = 'none';
        currentUser = null;
      }
    } catch (error) {
      console.error('خطأ:', error);
    } finally {
      // إخفاء مؤشر التحميل
      loader.classList.add('hidden');
    }
  });

  // ===== أحداث =====
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendMessage();
    }
  });

  // إخفاء مؤشر التحميل في حالة وجود خطأ (كحماية)
  setTimeout(() => {
    loader.classList.add('hidden');
  }, 5000);
</script>
</body>
</html>
