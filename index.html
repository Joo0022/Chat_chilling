<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Chat_With_Us 💬</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rsbg47X7/8f55b377-3e6f-4bc9-bbc5-9b1ed3057599.png">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: linear-gradient(145deg, #0b1f3a, #1e4b6e);
      direction: rtl;
    }
    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px;
    }
    .card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(20, 40, 60, 0.4);
      backdrop-filter: blur(18px);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.15);
      overflow: hidden;
    }
    .header {
      padding: 18px 20px;
      text-align: center;
      color: white;
      font-weight: 700;
      font-size: 1.4rem;
      background: rgba(0, 30, 60, 0.5);
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* ===== تحسينات التمرير لصفحة المصادقة ===== */
    #auth {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    
    .auth-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 15px;
      min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: #3498db rgba(255,255,255,0.1);
    }
    
    .auth-content::-webkit-scrollbar {
      width: 6px;
    }
    
    .auth-content::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    
    .auth-content::-webkit-scrollbar-thumb {
      background: #3498db;
      border-radius: 10px;
    }
    
    .auth-form {
      padding: 15px 10px 25px 10px;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }
    
    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.1);
      padding: 5px;
      border-radius: 60px;
      flex-shrink: 0;
    }
    
    .auth-tab {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 50px;
      background: transparent;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .auth-tab.active {
      background: #3498db;
      color: white;
      box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-group label {
      display: block;
      color: rgba(255,255,255,0.9);
      margin-bottom: 8px;
      font-size: 0.95rem;
      font-weight: 500;
    }
    
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    
    .input-icon {
      position: absolute;
      right: 15px;
      color: rgba(255,255,255,0.6);
      font-size: 1.2rem;
      z-index: 1;
    }
    
    .auth-input {
      width: 100%;
      padding: 15px 50px 15px 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    .auth-input:focus {
      outline: none;
      border-color: #3498db;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
    }
    
    .password-wrapper {
      position: relative;
      width: 100%;
    }
    
    .password-wrapper .auth-input {
      padding-left: 60px;
    }
    
    .password-toggle-btn {
      position: absolute;
      left: 5px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 10px;
      width: auto;
    }
    
    .action-btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .action-btn.primary {
      background: #3498db;
      color: white;
    }
    
    .action-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 2px solid rgba(255,255,255,0.2);
    }
    
    /* ========== تحسينات واجهة المحادثة الرئيسية ========== */
    #chat {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    
    .chat-header {
      padding: 15px 20px;
      background: rgba(0, 30, 60, 0.8);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      flex-shrink: 0;
    }
    
    .chat-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .chat-title h2 {
      margin: 0;
      font-size: 1.3rem;
    }
    
    .online-count {
      background: rgba(46, 204, 113, 0.2);
      border: 1px solid #2ecc71;
      color: #2ecc71;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .online-count-dot {
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }
    
    .chat-actions {
      display: flex;
      gap: 10px;
    }
    
    .chat-action-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.2rem;
    }
    
    .chat-action-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }
    
    .chat-action-btn.logout {
      background: rgba(231, 76, 60, 0.2);
      border-color: #e74c3c;
    }
    
    .chat-action-btn.logout:hover {
      background: rgba(231, 76, 60, 0.4);
    }
    
    /* تخطيط المحادثة الرئيسي */
    .chat-layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    
    /* الشريط الجانبي للمتصلين */
    .sidebar {
      width: 280px;
      background: rgba(0, 0, 0, 0.3);
      border-left: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: white;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .sidebar-header i {
      color: #f1c40f;
    }
    
    .online-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      scrollbar-width: thin;
      scrollbar-color: #3498db rgba(255,255,255,0.1);
    }
    
    .online-list::-webkit-scrollbar {
      width: 4px;
    }
    
    .online-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
    }
    
    .online-list::-webkit-scrollbar-thumb {
      background: #3498db;
      border-radius: 10px;
    }
    
    .online-user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 5px;
      border: 1px solid transparent;
      position: relative;
    }
    
    .online-user-item:hover {
      background: rgba(52, 152, 219, 0.2);
      border-color: #3498db;
      transform: translateX(-5px);
    }
    
    .online-user-item.active {
      background: rgba(52, 152, 219, 0.3);
      border-color: #3498db;
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(145deg, #3498db, #9b59b6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      position: relative;
    }
    
    .user-status {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
    }
    
    .user-status.online {
      background: #2ecc71;
    }
    
    .user-status.offline {
      background: #95a5a6;
    }
    
    .user-info {
      flex: 1;
      min-width: 0;
    }
    
    .user-name {
      color: white;
      font-weight: 600;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .user-last-seen {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
    }
    
    .typing-indicator-small {
      font-size: 0.7rem;
      color: #f1c40f;
    }
    
    /* منطقة المحادثة الرئيسية */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .chat-mode {
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .mode-tabs {
      display: flex;
      gap: 5px;
      background: rgba(255,255,255,0.1);
      padding: 3px;
      border-radius: 40px;
    }
    
    .mode-tab {
      padding: 8px 20px;
      border: none;
      border-radius: 30px;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .mode-tab.active {
      background: #3498db;
    }
    
    .mode-tab.private {
      background: #9b59b6;
      display: none;
    }
    
    .mode-tab.private.show {
      display: flex;
    }
    
    .close-private-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 5px;
      margin-right: auto;
    }
    
    .close-private-btn:hover {
      color: #e74c3c;
    }
    
    /* منطقة الرسائل */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: rgba(0, 0, 0, 0.2);
      scrollbar-width: thin;
      scrollbar-color: #3498db rgba(255,255,255,0.1);
    }
    
    .messages-container::-webkit-scrollbar {
      width: 6px;
    }
    
    .messages-container::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
    }
    
    .messages-container::-webkit-scrollbar-thumb {
      background: #3498db;
      border-radius: 10px;
    }
    
    /* فقاعة الرسالة المحسنة */
    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: messageSlide 0.3s ease;
    }
    
    .message-wrapper.own {
      align-self: flex-end;
    }
    
    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      padding-right: 5px;
    }
    
    .message-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(145deg, #3498db, #9b59b6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.8rem;
      font-weight: bold;
    }
    
    .message-sender {
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      font-weight: 600;
    }
    
    .message-time {
      color: rgba(255,255,255,0.4);
      font-size: 0.7rem;
    }
    
    .message-bubble {
      padding: 12px 18px;
      border-radius: 20px 20px 20px 5px;
      background: rgba(52, 152, 219, 0.2);
      border: 1px solid rgba(52, 152, 219, 0.3);
      color: white;
      position: relative;
      word-break: break-word;
    }
    
    .message-wrapper.own .message-bubble {
      background: rgba(52, 152, 219, 0.7);
      border-radius: 20px 20px 5px 20px;
      border-color: transparent;
    }
    
    .message-wrapper.private .message-bubble {
      background: rgba(155, 89, 182, 0.2);
      border-color: #9b59b6;
    }
    
    .message-wrapper.private.own .message-bubble {
      background: rgba(155, 89, 182, 0.6);
    }
    
    .message-text {
      line-height: 1.5;
      font-size: 0.95rem;
    }
    
    .message-image {
      max-width: 250px;
      max-height: 200px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 5px;
    }
    
    /* ردود الفعل على الرسائل */
    .message-reactions {
      display: flex;
      gap: 5px;
      margin-top: 5px;
      padding: 5px 0;
    }
    
    .reaction-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 20px;
      padding: 3px 8px;
      color: white;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: all 0.2s ease;
    }
    
    .reaction-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }
    
    .reaction-count {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
    }
    
    .reply-indicator {
      font-size: 0.8rem;
      color: #f1c40f;
      margin-bottom: 5px;
      padding: 3px 8px;
      background: rgba(241, 196, 15, 0.1);
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    /* مؤشر "يكتب..." */
    .typing-indicator {
      padding: 10px 20px;
      color: #f1c40f;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .typing-dots {
      display: flex;
      gap: 3px;
    }
    
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #f1c40f;
      border-radius: 50%;
      animation: typingBounce 1.4s infinite;
    }
    
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    
    /* منطقة الإدخال المحسنة */
    .input-area-enhanced {
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .input-tools {
      display: flex;
      gap: 5px;
    }
    
    .tool-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.2rem;
    }
    
    .tool-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }
    
    .input-wrapper-enhanced {
      flex: 1;
      position: relative;
    }
    
    .chat-input {
      width: 100%;
      padding: 15px 50px 15px 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    .chat-input:focus {
      outline: none;
      border-color: #3498db;
      background: rgba(255,255,255,0.15);
    }
    
    .chat-input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    
    .send-btn {
      position: absolute;
      left: 5px;
      top: 50%;
      transform: translateY(-50%);
      background: #3498db;
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.2rem;
    }
    
    .send-btn:hover {
      background: #2980b9;
      transform: translateY(-50%) scale(1.1);
    }
    
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* بقية الأنماط */
    .private-page {
      display: none;
    }
    
    .image-preview-container {
      position: fixed;
      bottom: 100px;
      right: 20px;
      background: rgba(0,0,0,0.9);
      border-radius: 15px;
      padding: 10px;
      border: 2px solid #9b59b6;
      display: none;
      z-index: 2000;
      max-width: 300px;
    }
    
    .full-image-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 3000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    
    .upload-progress {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 20px;
      border-radius: 15px;
      color: white;
      text-align: center;
      z-index: 2500;
      display: none;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #9b59b6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #0b1f3a, #1e4b6e);
      z-index: 10000;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 5000;
      display: none;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
<div class="loader-container" id="loader">
  <div style="display: flex; flex-direction: column; align-items: center;">
    <div class="loader"></div>
    <div class="loader-text">جاري التحميل...</div>
  </div>
</div>

<div class="container">
  <!-- صفحة المصادقة -->
  <div class="card" id="auth">
    <div class="header">💬 مرحباً بك في الدردشة</div>
    <div class="auth-content">
      <div class="auth-form">
        <div class="auth-tabs">
          <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">تسجيل الدخول</button>
          <button class="auth-tab" id="registerTab" onclick="switchAuthTab('register')">إنشاء حساب جديد</button>
        </div>

        <div id="loginForm" style="display: block;">
          <div class="input-group">
            <label for="loginEmail">📧 البريد الإلكتروني</label>
            <div class="input-wrapper">
              <span class="input-icon">📧</span>
              <input type="email" id="loginEmail" placeholder="example@domain.com" class="auth-input">
            </div>
          </div>

          <div class="input-group">
            <label for="loginPassword">🔒 كلمة المرور</label>
            <div class="password-wrapper">
              <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" class="auth-input">
            </div>
          </div>

          <div class="action-buttons">
            <button class="action-btn primary" onclick="login()" id="loginBtn">🔑 تسجيل الدخول</button>
          </div>

          <div class="forgot-password-link">
            <button onclick="showForgotPasswordModal()">🔑 نسيت كلمة السر..؟</button>
          </div>
        </div>

        <div id="registerForm" style="display: none;">
          <div class="input-group">
            <label for="username">👤 اسم المستخدم</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="username" placeholder="اختر اسم مستخدم" class="auth-input">
            </div>
          </div>

          <div class="input-group">
            <label for="email">📧 البريد الإلكتروني</label>
            <div class="input-wrapper">
              <span class="input-icon">📧</span>
              <input type="email" id="email" placeholder="example@domain.com" class="auth-input">
            </div>
          </div>

          <div class="input-group">
            <label for="password">🔒 كلمة المرور</label>
            <div class="password-wrapper">
              <input type="password" id="password" placeholder="أدخل كلمة المرور" class="auth-input">
            </div>
          </div>

          <div class="action-buttons">
            <button class="action-btn secondary" onclick="register()" id="registerBtn">📝 إنشاء حساب</button>
          </div>
        </div>

        <div class="separator">أو</div>

        <button class="google-btn" onclick="googleLogin()">
          <svg style="width:20px; height:20px;" viewBox="0 0 24 24">
            <path fill="white" d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
          </svg>
          Google تسجيل الدخول بحساب
        </button>
      </div>
    </div>
  </div>

  <!-- صفحة المحادثة المحسنة -->
  <div class="card" id="chat">
    <div class="chat-header">
      <div class="chat-title">
        <h2>💬 المحادثة العامة</h2>
        <div class="online-count" id="onlineCount">
          <span class="online-count-dot"></span>
          <span id="onlineCountText">0 متصل</span>
        </div>
      </div>
      <div class="chat-actions">
        <button class="chat-action-btn" onclick="toggleSettings()" title="الإعدادات">⚙️</button>
        <button class="chat-action-btn logout" onclick="logout()" title="تسجيل الخروج">🚪</button>
      </div>
    </div>

    <div class="chat-layout">
      <!-- الشريط الجانبي للمتصلين -->
      <div class="sidebar">
        <div class="sidebar-header">
          <i>👥</i>
          <span>المتصلون الآن</span>
        </div>
        <div class="online-list" id="onlineList"></div>
      </div>

      <!-- منطقة المحادثة الرئيسية -->
      <div class="chat-main">
        <div class="chat-mode">
          <div class="mode-tabs" id="modeTabs">
            <button class="mode-tab active" onclick="switchMode('public')" id="publicModeTab">
              <span>🌐</span> عام
            </button>
            <button class="mode-tab private" onclick="switchMode('private')" id="privateModeTab">
              <span>🔒</span> خاص مع <span id="privatePartnerNameTab"></span>
            </button>
          </div>
          <button class="close-private-btn" onclick="closePrivateChat()" id="closePrivateBtn" style="display: none;">✕</button>
        </div>

        <!-- منطقة الرسائل -->
        <div class="messages-container" id="messages"></div>

        <!-- مؤشر "يكتب..." -->
        <div class="typing-indicator" id="typingIndicator" style="display: none;">
          <span>يكتب</span>
          <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <!-- منطقة الإدخال المحسنة -->
        <div class="input-area-enhanced">
          <div class="input-tools">
            <button class="tool-btn" onclick="openImageUpload()" title="إرفاق صورة">📎</button>
            <button class="tool-btn" onclick="openEmojiPicker()" title="إضافة إيموجي">😊</button>
          </div>
          <div class="input-wrapper-enhanced">
            <input type="text" id="messageInput" class="chat-input" placeholder="اكتب رسالتك هنا...">
            <button class="send-btn" onclick="sendMessage()" id="sendBtn" title="إرسال">✈️</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- النوافذ المنبثقة -->
<div class="modal-overlay" id="forgotPasswordModal">
  <div class="modal-content">
    <h3>🔑 استعادة كلمة السر</h3>
    <p>أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور</p>
    <input type="email" id="resetEmail" placeholder="البريد الإلكتروني">
    <div class="modal-buttons">
      <button class="send-btn" onclick="sendPasswordReset()">إرسال</button>
      <button class="cancel-btn" onclick="hideForgotPasswordModal()">إلغاء</button>
    </div>
  </div>
</div>

<div class="image-preview-container" id="imagePreviewContainer">
  <img id="imagePreview" class="image-preview" src="" alt="معاينة الصورة">
  <div class="preview-actions">
    <button class="send-image-btn" onclick="sendImageMessage()">✓ إرسال الصورة</button>
    <button class="cancel-image-btn" onclick="cancelImageUpload()">✗ إلغاء</button>
  </div>
</div>

<div class="upload-progress" id="uploadProgress">
  <div>جاري رفع الصورة...</div>
  <div class="spinner"></div>
</div>

<div class="full-image-modal" id="fullImageModal">
  <button class="close-modal" onclick="document.getElementById('fullImageModal').classList.remove('show')">✕</button>
  <img id="fullImage" src="" alt="">
</div>

<script>
  // ✅ تهيئة Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyANJjbTOFTKUAuT-g1BKY7LU9a4OabSEDQ",
    authDomain: "enhanced-app-492f6.firebaseapp.com",
    projectId: "enhanced-app-492f6",
    storageBucket: "enhanced-app-492f6.firebasestorage.app",
    messagingSenderId: "544947944105",
    appId: "1:544947944105:web:f2ac32d485c8ad68b647b8"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const googleProvider = new firebase.auth.GoogleAuthProvider();

  // ✅ العناصر
  const loader = document.getElementById('loader');
  const authDiv = document.getElementById('auth');
  const chatDiv = document.getElementById('chat');
  const messagesDiv = document.getElementById('messages');
  const messageInput = document.getElementById('messageInput');
  const onlineList = document.getElementById('onlineList');
  const onlineCountText = document.getElementById('onlineCountText');
  const typingIndicator = document.getElementById('typingIndicator');
  const privateModeTab = document.getElementById('privateModeTab');
  const privatePartnerNameTab = document.getElementById('privatePartnerNameTab');
  const closePrivateBtn = document.getElementById('closePrivateBtn');
  const publicModeTab = document.getElementById('publicModeTab');
  
  // ✅ متغيرات الحالة
  let currentUser = null;
  let currentUsername = '';
  let unsubscribePublic = null;
  let unsubscribePrivate = null;
  let unsubscribeOnline = null;
  let unsubscribeTyping = null;
  let activePartner = null;
  let isPrivateMode = false;
  let typingTimeout = null;
  
  // ✅ ألوان مختلفة للمستخدمين
  const userColors = {};
  const userAvatars = {};

  // ===== دوال المصادقة الأساسية =====
  function switchAuthTab(tab) {
    document.getElementById('loginTab').classList.toggle('active', tab === 'login');
    document.getElementById('registerTab').classList.toggle('active', tab === 'register');
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  }

  function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    auth.signInWithEmailAndPassword(email, password)
      .catch(err => alert('خطأ: ' + err.message));
  }

  function register() {
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    auth.createUserWithEmailAndPassword(email, password)
      .then(result => {
        return db.collection('users').doc(result.user.uid).set({
          username: username,
          email: email,
          online: true,
          avatar: getAvatarColor(result.user.uid)
        });
      })
      .catch(err => alert('خطأ: ' + err.message));
  }

  function googleLogin() {
    auth.signInWithPopup(googleProvider)
      .then(result => {
        const email = result.user.email;
        const username = email.split('@')[0];
        return db.collection('users').doc(result.user.uid).set({
          username: username,
          email: email,
          online: true,
          avatar: getAvatarColor(result.user.uid)
        }, { merge: true });
      })
      .catch(err => alert('خطأ: ' + err.message));
  }

  function logout() {
    if (currentUser) {
      db.collection('users').doc(currentUser.uid).update({ online: false })
        .finally(() => auth.signOut());
    }
  }

  // ===== دوال مساعدة =====
  function getAvatarColor(uid) {
    const colors = ['#3498db', '#9b59b6', '#e74c3c', '#2ecc71', '#f1c40f', '#e67e22'];
    const index = uid.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
    return colors[index];
  }

  function getInitials(name) {
    return name ? name.charAt(0).toUpperCase() : '?';
  }

  // ===== مراقبة حالة المصادقة =====
  auth.onAuthStateChanged(async (user) => {
    loader.classList.remove('hidden');
    
    try {
      if (user) {
        currentUser = user;
        
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (userDoc.exists) {
          currentUsername = userDoc.data().username;
        } else {
          currentUsername = user.email.split('@')[0];
          await db.collection('users').doc(user.uid).set({
            username: currentUsername,
            email: user.email,
            online: true,
            avatar: getAvatarColor(user.uid)
          });
        }
        
        await db.collection('users').doc(user.uid).update({ online: true });
        
        loadPublicMessages();
        loadOnlineUsers();
        
        authDiv.style.display = 'none';
        chatDiv.style.display = 'flex';
      } else {
        authDiv.style.display = 'flex';
        chatDiv.style.display = 'none';
        currentUser = null;
      }
    } catch (error) {
      console.error('خطأ:', error);
    } finally {
      loader.classList.add('hidden');
    }
  });

  // ===== تحميل قائمة المتصلين =====
  function loadOnlineUsers() {
    if (unsubscribeOnline) unsubscribeOnline();
    
    unsubscribeOnline = db.collection('users')
      .where('online', '==', true)
      .onSnapshot(snapshot => {
        let html = '';
        let onlineCount = 0;
        
        snapshot.forEach(doc => {
          const data = doc.data();
          if (doc.id !== currentUser?.uid) {
            onlineCount++;
            html += `
              <div class="online-user-item" onclick="openPrivateChat('${doc.id}', '${escapeHtml(data.username)}')">
                <div class="user-avatar" style="background: ${data.avatar || '#3498db'}">
                  ${getInitials(data.username)}
                  <span class="user-status online"></span>
                </div>
                <div class="user-info">
                  <div class="user-name">${escapeHtml(data.username)}</div>
                  <div class="user-last-seen">متصل الآن</div>
                </div>
              </div>
            `;
          }
        });
        
        onlineList.innerHTML = html || '<div style="color:white; text-align:center; padding:20px;">لا يوجد متصلين آخرين</div>';
        onlineCountText.textContent = `${onlineCount} متصل`;
      });
  }

  // ===== فتح محادثة خاصة =====
  window.openPrivateChat = function(uid, username) {
    if (!currentUser) return;
    
    activePartner = { uid, username };
    privatePartnerNameTab.textContent = username;
    privateModeTab.classList.add('show');
    closePrivateBtn.style.display = 'block';
    
    switchMode('private');
    loadPrivateMessages(uid);
  };

  // ===== إغلاق المحادثة الخاصة =====
  window.closePrivateChat = function() {
    activePartner = null;
    privateModeTab.classList.remove('show');
    closePrivateBtn.style.display = 'none';
    publicModeTab.click();
    
    if (unsubscribePrivate) {
      unsubscribePrivate();
      unsubscribePrivate = null;
    }
  };

  // ===== التبديل بين الأوضاع =====
  window.switchMode = function(mode) {
    isPrivateMode = mode === 'private';
    
    document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
    if (mode === 'public') {
      publicModeTab.classList.add('active');
      loadPublicMessages();
    } else {
      privateModeTab.classList.add('active');
    }
  };

  // ===== تحميل الرسائل العامة =====
  function loadPublicMessages() {
    if (unsubscribePublic) unsubscribePublic();
    if (unsubscribePrivate) unsubscribePrivate();
    
    unsubscribePublic = db.collection('messages')
      .orderBy('createdAt', 'asc')
      .onSnapshot(snapshot => {
        messagesDiv.innerHTML = '';
        
        snapshot.forEach(doc => {
          const msg = doc.data();
          if (!msg.text && !msg.imageUrl) return;
          
          const messageEl = createMessageElement(msg);
          messagesDiv.appendChild(messageEl);
        });
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
  }

  // ===== تحميل الرسائل الخاصة =====
  function loadPrivateMessages(partnerUid) {
    if (unsubscribePrivate) unsubscribePrivate();
    
    const roomId = currentUser.uid < partnerUid 
      ? currentUser.uid + '_' + partnerUid 
      : partnerUid + '_' + currentUser.uid;
    
    unsubscribePrivate = db.collection('private_messages')
      .where('roomId', '==', roomId)
      .orderBy('createdAt', 'asc')
      .onSnapshot(snapshot => {
        messagesDiv.innerHTML = '';
        
        snapshot.forEach(doc => {
          const msg = doc.data();
          if (!msg.text && !msg.imageUrl) return;
          
          const messageEl = createMessageElement(msg, true);
          messagesDiv.appendChild(messageEl);
        });
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
  }

  // ===== إنشاء عنصر الرسالة =====
  function createMessageElement(msg, isPrivate = false) {
    const wrapper = document.createElement('div');
    wrapper.className = `message-wrapper ${msg.uid === currentUser?.uid ? 'own' : ''} ${isPrivate ? 'private' : ''}`;
    
    let time = '';
    if (msg.createdAt?.toDate) {
      const d = msg.createdAt.toDate();
      time = `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
    }
    
    let content = `
      <div class="message-header">
        <div class="message-avatar" style="background: ${msg.avatar || getAvatarColor(msg.uid)}">
          ${getInitials(msg.username)}
        </div>
        <span class="message-sender">${escapeHtml(msg.username)}</span>
        <span class="message-time">${time}</span>
      </div>
      <div class="message-bubble">
    `;
    
    if (msg.text) {
      content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
    }
    
    if (msg.imageUrl) {
      content += `<img src="${escapeHtml(msg.imageUrl)}" class="message-image" onclick="showFullImage('${escapeHtml(msg.imageUrl)}')">`;
    }
    
    content += `
        <div class="message-reactions">
          <button class="reaction-btn" onclick="addReaction('${msg.id}', '👍')">👍 <span class="reaction-count">0</span></button>
          <button class="reaction-btn" onclick="addReaction('${msg.id}', '❤️')">❤️ <span class="reaction-count">0</span></button>
          <button class="reaction-btn" onclick="addReaction('${msg.id}', '😮')">😮 <span class="reaction-count">0</span></button>
        </div>
      </div>
    `;
    
    wrapper.innerHTML = content;
    return wrapper;
  }

  // ===== إرسال رسالة =====
  window.sendMessage = function() {
    const text = messageInput.value.trim();
    if (!text || !currentUser) return;
    
    if (isPrivateMode && activePartner) {
      const roomId = currentUser.uid < activePartner.uid 
        ? currentUser.uid + '_' + activePartner.uid 
        : activePartner.uid + '_' + currentUser.uid;
      
      db.collection('private_messages').add({
        text: text,
        username: currentUsername,
        uid: currentUser.uid,
        toUid: activePartner.uid,
        roomId: roomId,
        avatar: getAvatarColor(currentUser.uid),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      db.collection('messages').add({
        text: text,
        username: currentUsername,
        uid: currentUser.uid,
        avatar: getAvatarColor(currentUser.uid),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    
    messageInput.value = '';
  };

  // ===== دوال مساعدة =====
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // ===== أحداث =====
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ===== نوافذ منبثقة =====
  window.showForgotPasswordModal = () => document.getElementById('forgotPasswordModal').classList.add('show');
  window.hideForgotPasswordModal = () => document.getElementById('forgotPasswordModal').classList.remove('show');
  
  window.showFullImage = (url) => {
    document.getElementById('fullImage').src = url;
    document.getElementById('fullImageModal').classList.add('show');
  };

  // دوال وهمية للوظائف غير المكتملة
  window.toggleSettings = () => alert('قريباً...');
  window.openImageUpload = () => alert('قريباً...');
  window.openEmojiPicker = () => alert('قريباً...');
  window.addReaction = () => alert('قريباً...');
  window.sendPasswordReset = () => {
    alert('تم إرسال رابط إعادة التعيين');
    hideForgotPasswordModal();
  };
</script>
</body>
  </html>
